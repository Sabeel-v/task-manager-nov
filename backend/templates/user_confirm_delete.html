{% extends 'base.html' %}

{% block title %}Delete User - TaskFlow{% endblock %}
{% block page_title %}Delete User{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; text-align: center;">
    <h3 style="color: var(--danger);"><i class="fa-solid fa-triangle-exclamation"></i> Confirm Deletion</h3>
    <p>Are you sure you want to delete user <strong>{{ object.username }}</strong>?</p>
    <p style="color: var(--text-muted); font-size: 0.9rem;">This action cannot be undone.</p>
    
    <form method="POST" style="margin-top: 20px;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'user_list' %}" class="btn btn-outline" style="margin-left: 10px;">Cancel</a>
    </form>
</div>
{% endblock %}
