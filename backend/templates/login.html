{% extends 'base.html' %}

{% block title %}Login - TaskFlow{% endblock %}

{% block auth_content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 style="margin-bottom: 30px; font-weight: 600;">Welcome Back</h2>
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group" style="text-align: left;">
                <label>Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
            </div>
            
            <div class="form-group" style="text-align: left; margin-bottom: 25px;">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="btn" style="width: 100%;">Sign In</button>
        </form>

        {% if error %}
            <p style="color: var(--danger); margin-top: 15px; font-size: 0.9rem;">{{ error }}</p>
        {% endif %}
    </div>
</div>
{% endblock %}
